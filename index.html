<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NTPC Solapur Operations Portal</title>

    <!-- Favicon for browser tabs -->
    <link rel="icon" href="icon-192.png" type="image/png">
    <!-- <link rel="icon" href="favicon.ico" type="image/ico"> -->

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Android manifest -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Persistent App Header mimicking v0 AppShell -->
    <header class="app-header">
        <div class="header-inner">
            <button class="brand-btn"
                onclick="updateState({ module: 'HOME', docsPath: [], protectionArea: null, protectionEquip: null, electricalUnit: null })"
                title="Go to Home">
                <div class="brand-icon">
                    <img src="icon-header.png" alt="Brand Logo" class="brand-img">
                </div>
                <div class="brand-text">
                    <span class="brand-tiny">NTPC Solapur</span>
                    <span class="brand-title font-mono">Operation Department</span>
                </div>
            </button>

            <!-- Dynamic Navigation Actions (Home, Back) -->
            <div id="header-nav-actions" class="header-nav" style="display: none;"></div>
        </div>
    </header>

    <!-- Main Dynamic Container -->
    <main class="main-wrapper" id="app-container">
        <!-- Content gets rendered here -->
    </main>

    <!-- App Footer -->
    <footer class="app-footer">
        <div class="footer-inner text-muted">
            <span class="footer-item font-mono">
                <img src="Developer-iocn.png" alt="Developer" class="footer-icon">
                Developed by Akash Kantaria
            </span>
            <span class="footer-separator">•</span>
            <span class="footer-item font-mono">
                <img src="Team-icon.png" alt="Management" class="footer-icon">
                Managed by Operation Department
            </span>
        </div>
    </footer>

    <!-- Document Viewer Modal -->
    <div id="docModal" class="modal-layer">
        <div class="modal-window">
            <div class="modal-head">
                <span class="modal-title font-mono" id="modalTitle">Document Viewer</span>
                <button class="modal-close" onclick="closeDocument()" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <iframe id="docViewer" src=""></iframe>
            </div>
        </div>
    </div>

    <!-- Data dependencies -->
    <script src="data-electrical.js"></script>
    <script src="data-protection.js"></script>
    <!-- <script src="data-docs.js"></script> -->

    <!-- Application Logic -->
    <script src="app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered successfully.'))
                    .catch(err => console.error('Service Worker registration failed.', err));
            });
        }
    </script>
</body>

</html>
